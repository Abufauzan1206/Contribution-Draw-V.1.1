<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CMP Platform Dashboard</title>

    <link rel="stylesheet" href="css/platform.css">
</head>

<body>

<header>

    <h1>ABUFAUZAN TECH CMP</h1>

    <p>Platform Owner Portal</p>

</header>

<main>

<section id="summary">

    <div class="card">
        <h3>Organizations</h3>
        <h2 id="organizationCount">0</h2>
    </div>

    <div class="card">
        <h3>Active Licenses</h3>
        <h2 id="licenseCount">0</h2>
    </div>

    <div class="card">
        <h3>Subscriptions</h3>
        <h2 id="subscriptionCount">0</h2>
    </div>

    <div class="card">
        <h3>Revenue</h3>
        <h2 id="revenue">₦0</h2>
    </div>

</section>

<section id="quickActions">

    <button id="btnOrganizations">
        Organizations
    </button>

    <button id="btnLicenses">
        Licenses
    </button>

    <button id="btnSubscriptions">
        Subscriptions
    </button>

    <button id="btnAnnouncements">
        Announcements
    </button>

    <button id="btnSupport">
        Support
    </button>

</section>

<section>

    <h2>Recent Activity</h2>

    <div id="recentActivity">

        No activity available.

    </div>

</section>

</main>

<script type="module" src="js/dashboard.js"></script>
